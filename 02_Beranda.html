    <script>
        // >>>> FUNGSI FORMAT RUPIAH <<<<
        function formatRupiah(angka) {
            if (!angka || angka === 0) return "Rp 0";
            return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Toggle Sidenav
        const sidenavToggle = document.getElementById('sidebarToggle');
        const sidenavNav = document.getElementById('layoutSidenav_nav');
        const sidenavOverlay = document.getElementById('sidenavOverlay');
        const navLinks = document.querySelectorAll('.nav-link');

        if(sidenavToggle) {
            sidenavToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidenavNav.classList.toggle('active');
                sidenavOverlay.classList.toggle('active');
            });
        }

        if(sidenavOverlay) {
            sidenavOverlay.addEventListener('click', () => {
                sidenavNav.classList.remove('active');
                sidenavOverlay.classList.remove('active');
            });
        }

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    sidenavNav.classList.remove('active');
                    sidenavOverlay.classList.remove('active');
                }
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                sidenavNav.classList.remove('active');
                sidenavOverlay.classList.remove('active');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const collapses = document.querySelectorAll('.collapse');
            collapses.forEach(collapse => {
                new bootstrap.Collapse(collapse, { toggle: false });
            });
        });


        // >>>> JALANKAN SAAT HALAMAN DIBUKA <<<<
        window.onload = function() {

           // >>> TAMPILKAN ANGKA DI KOTAK MENU <<<
            // Ambil data total dari localStorage
            const dataAwal = JSON.parse(localStorage.getItem('dataAwal')) || [];
            const dataBeli = JSON.parse(localStorage.getItem('dataBeli')) || [];
            const dataAkhir = JSON.parse(localStorage.getItem('dataAkhir')) || [];
            const totalBeban = parseFloat(localStorage.getItem('totalBeban')) || 0;

            // Hitung Total Harga Jual
            let totalAwalJual = 0;
            dataAwal.forEach(item => {
                totalAwalJual += parseFloat(item.totalJual) || 0;
            });

            let totalBeliJual = 0;
            dataBeli.forEach(item => {
                totalBeliJual += parseFloat(item.totalJual) || 0;
            });

            let totalAkhirJual = 0;
            dataAkhir.forEach(item => {
                totalAkhirJual += parseFloat(item.totalJual) || 0;
            });

            // Hitung Penjualan & Laba
            const totalPenjualan = totalAwalJual + totalBeliJual - totalAkhirJual;
            const labaBersih = totalPenjualan - totalBeban; // Sementara hitung sederhana dulu

            document.getElementById('nilaiPenjualan').textContent = formatRupiah(totalPenjualan);
            document.getElementById('nilaiBeban').textContent = formatRupiah(totalBeban);
            document.getElementById('nilaiLaba').textContent = formatRupiah(labaBersih);

            // >>> UBAH WARNA & TULISAN OTOMATIS <<<
            const kartuLaba = document.getElementById('kartuLaba');
            const judulKartu = kartuLaba.querySelector('h5'); 

            if(labaBersih < 0) {
                kartuLaba.style.backgroundColor = '#dc3545'; // Merah
                judulKartu.textContent = "RUGI";
            } else {
                kartuLaba.style.backgroundColor = '#28a745'; // Hijau
                judulKartu.textContent = "LABA";
            }


            // >>>> GRAFIK OTOMATIS <<<<
            const ctx = document.getElementById('grafikLabaRugi').getContext('2d');
            
            const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            
            const data = [
                parseFloat(localStorage.getItem('laba_Jan')) || 0,
                parseFloat(localStorage.getItem('laba_Feb')) || 0,
                parseFloat(localStorage.getItem('laba_Mar')) || 0,
                parseFloat(localStorage.getItem('laba_Apr')) || 0,
                parseFloat(localStorage.getItem('laba_Mei')) || 0,
                parseFloat(localStorage.getItem('laba_Jun')) || 0,
                parseFloat(localStorage.getItem('laba_Jul')) || 0,
                parseFloat(localStorage.getItem('laba_Agu')) || 0,
                parseFloat(localStorage.getItem('laba_Sep')) || 0,
                parseFloat(localStorage.getItem('laba_Okt')) || 0,
                parseFloat(localStorage.getItem('laba_Nov')) || 0,
                parseFloat(localStorage.getItem('laba_Des')) || 0
            ];

            const backgroundColors = data.map(nilai => nilai >= 0 ? '#28a745' : '#dc3545');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Laba / Rugi (Rp)',
                        data: data,
                        backgroundColor: backgroundColors,
                        borderWidth: 0,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return 'Rp ' + value.toLocaleString('id-ID');
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: 'Grafik Laba Rugi Periode Tahun Ini',
                            font: { size: 18 }
                        }
                    }
                }
            });
        };
    </script>
